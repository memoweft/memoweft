<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="MemoWeft — long-term memory for AI, woven thread by thread">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14110B"/>
      <stop offset="1" stop-color="#1E1813"/>
    </linearGradient>
    <linearGradient id="weft" gradientUnits="userSpaceOnUse" x1="150" y1="0" x2="1245" y2="0">
      <stop offset="0" stop-color="#6FB7B0" stop-opacity="0"/>
      <stop offset="0.30" stop-color="#6FB7B0" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#6FB7B0" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E2A75E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E2A75E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- weft (horizontal, cool teal — the "inferred" threads), left-faded via gradient -->
  <g stroke="url(#weft)" stroke-width="1.1">
    <line x1="120" y1="68"  x2="1245" y2="68"/>
    <line x1="120" y1="102" x2="1245" y2="102"/>
    <line x1="120" y1="136" x2="1245" y2="136"/>
    <line x1="120" y1="170" x2="1245" y2="170"/>
    <line x1="120" y1="204" x2="1245" y2="204"/>
    <line x1="120" y1="238" x2="1245" y2="238"/>
    <line x1="120" y1="272" x2="1245" y2="272"/>
    <line x1="120" y1="306" x2="1245" y2="306"/>
    <line x1="120" y1="340" x2="1245" y2="340"/>
  </g>

  <!-- warp (vertical, warm gold — the "fact" threads), density/opacity grows to the right -->
  <g stroke="#E2A75E" stroke-width="1">
    <line x1="545"  y1="60" x2="545"  y2="346" opacity="0.10"/>
    <line x1="595"  y1="60" x2="595"  y2="346" opacity="0.13"/>
    <line x1="645"  y1="60" x2="645"  y2="346" opacity="0.16"/>
    <line x1="695"  y1="60" x2="695"  y2="346" opacity="0.19"/>
    <line x1="745"  y1="60" x2="745"  y2="346" opacity="0.22"/>
    <line x1="795"  y1="60" x2="795"  y2="346" opacity="0.25"/>
    <line x1="845"  y1="60" x2="845"  y2="346" opacity="0.28"/>
    <line x1="895"  y1="60" x2="895"  y2="346" opacity="0.31"/>
    <line x1="945"  y1="60" x2="945"  y2="346" opacity="0.34"/>
    <line x1="995"  y1="60" x2="995"  y2="346" opacity="0.37"/>
    <line x1="1045" y1="60" x2="1045" y2="346" opacity="0.40"/>
    <line x1="1095" y1="60" x2="1095" y2="346" opacity="0.43"/>
    <line x1="1145" y1="60" x2="1145" y2="346" opacity="0.46"/>
    <line x1="1195" y1="60" x2="1195" y2="346" opacity="0.49"/>
    <line x1="1240" y1="60" x2="1240" y2="346" opacity="0.52"/>
  </g>

  <!-- loose thread-ends on the left: scattered clues drifting in toward the cloth -->
  <g fill="none" stroke="#E2A75E" stroke-linecap="round">
    <path d="M120,150 C 260,120 400,150 545,178" stroke-width="1.4" opacity="0.30"/>
    <path d="M120,210 C 280,202 410,222 545,224" stroke-width="1.4" opacity="0.30"/>
    <path d="M120,270 C 250,300 410,270 545,262" stroke-width="1.4" opacity="0.30"/>
    <path d="M120,180 C 300,168 420,196 545,200" stroke-width="1" opacity="0.16"/>
    <path d="M120,242 C 270,250 420,244 545,242" stroke-width="1" opacity="0.16"/>
  </g>

  <!-- nodes at intersections: evidence knotted into cognition -->
  <g fill="#E2A75E">
    <circle cx="645"  cy="204" r="2.6" opacity="0.7"/>
    <circle cx="745"  cy="136" r="2.6" opacity="0.7"/>
    <circle cx="795"  cy="272" r="2.6" opacity="0.7"/>
    <circle cx="895"  cy="170" r="2.6" opacity="0.7"/>
    <circle cx="995"  cy="204" r="2.6" opacity="0.7"/>
    <circle cx="1095" cy="306" r="2.6" opacity="0.7"/>
    <circle cx="1145" cy="170" r="2.6" opacity="0.7"/>
    <circle cx="1195" cy="238" r="2.6" opacity="0.7"/>
    <circle cx="845"  cy="340" r="2.6" opacity="0.7"/>
    <circle cx="695"  cy="272" r="2.6" opacity="0.7"/>
  </g>
  <!-- highlighted cognitions with a soft halo -->
  <g>
    <circle cx="845"  cy="238" r="15" fill="url(#glow)"/>
    <circle cx="845"  cy="238" r="3.6" fill="#F0C98A"/>
    <circle cx="1045" cy="272" r="15" fill="url(#glow)"/>
    <circle cx="1045" cy="272" r="3.6" fill="#F0C98A"/>
    <circle cx="945"  cy="136" r="15" fill="url(#glow)"/>
    <circle cx="945"  cy="136" r="3.6" fill="#F0C98A"/>
    <circle cx="1145" cy="204" r="15" fill="url(#glow)"/>
    <circle cx="1145" cy="204" r="3.6" fill="#F0C98A"/>
  </g>

  <!-- text -->
  <text x="76" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="5" fill="#E2A75E" opacity="0.85">MEMORY, WOVEN</text>
  <text x="72" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="600" letter-spacing="-1" fill="#F6F1E7">MemoWeft</text>
  <line x1="80" y1="222" x2="300" y2="222" stroke="#E2A75E" stroke-width="2.5" opacity="0.9"/>
  <text x="78" y="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#C4BAA9">Long-term memory for AI — it remembers who the user is,</text>
  <text x="78" y="288" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#C4BAA9">keeps facts and guesses apart, and carries it across models.</text>
  <text x="78" y="332" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#8C8474">You import it — zero runtime dependencies, every judgment traceable.</text>
</svg>
