version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      npm-development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /py
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
