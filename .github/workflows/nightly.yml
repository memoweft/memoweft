# Scheduled live-model verification. Deterministic checks remain in ci.yml;
# this workflow exercises the configured model and optional embedding endpoints.

name: Nightly Live

on:
  schedule:
    - cron: '0 18 * * *' # Daily at 18:00 UTC.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live model verification
    runs-on: ubuntu-latest
    # Full live-model evaluation plus retrieval checks.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Live tests (test:live)
        run: npm run test:live
        env:
          MEMOWEFT_LLM_BASE_URL: ${{ secrets.MEMOWEFT_LLM_BASE_URL }}
          MEMOWEFT_LLM_API_KEY: ${{ secrets.MEMOWEFT_LLM_API_KEY }}
          MEMOWEFT_LLM_MODEL: ${{ secrets.MEMOWEFT_LLM_MODEL }}
          MEMOWEFT_EMBED_BASE_URL: ${{ secrets.MEMOWEFT_EMBED_BASE_URL }}
          MEMOWEFT_EMBED_API_KEY: ${{ secrets.MEMOWEFT_EMBED_API_KEY }}
          MEMOWEFT_EMBED_MODEL: ${{ secrets.MEMOWEFT_EMBED_MODEL }}

      - name: Upload live run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-live-runs
          path: bench/runs/
          if-no-files-found: warn
