# Required checks for the zero-dependency Node 24 path, supported SQLite fallbacks,
# integration compatibility, documentation, and Python parity.

name: CI

on:
  push:
    branches: [main]
    # Version tags enter this workflow; publish is gated separately below.
    tags: ['v*']
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Keep pull-request checks deterministic; live-model coverage runs nightly.

jobs:
  guardrails:
    name: Guardrails (Node 24 · zero-dependency path)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Keep the lockfile on the public npm registry for reproducible installs.
      - name: lockfile registry guard
        run: |
          if grep -q "npmmirror" package-lock.json; then
            echo "::error::package-lock.json references a mirror; regenerate it with the public npm registry"
            exit 1
          fi

      - name: Setup Node 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          # Node 24 is the zero-dependency reference path.
          node-version: '24'
          cache: 'npm'

      # Prefer reproducible installs when a lockfile is present.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Verify the built-in SQLite path without optional native modules.
      - name: Remove optional better-sqlite3 (assert zero-dep path)
        run: rm -rf node_modules/better-sqlite3

      # Build Core before workspace checks because they import its dist output.
      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      # Check documentation links without a build.
      - name: Docs — dead links
        run: npm run docs:links

      - name: Core Typecheck
        run: npm run typecheck

      # Compare the public export surface with the API snapshot.
      - name: API Freeze Check
        run: npm run api:check

      # Report coverage for the zero-dependency path without enforcing a threshold.
      - name: Core Test (with coverage)
        run: npm run test:coverage

      - name: Core Build
        run: npm run build

      # Assert exactly the intended files ship to npm; nothing more, nothing less.
      - name: Package manifest assertion
        run: |
          files=$(npm pack --dry-run --json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write((j[0].files||[]).map(f=>f.path).join('\n'))})")
          echo "packed files:"; echo "$files"
          for must in dist/index.js dist/index.d.ts README.md README.zh-CN.md CHANGELOG.md LICENSE; do
            echo "$files" | grep -qxF "$must" || { echo "::error::npm tarball is missing $must"; exit 1; }
          done
          if echo "$files" | grep -qE '^(src/|tests/|bench/|testbench/|scripts/|examples/|docs/|\.env)'; then
            echo "::error::npm tarball would ship files it must not:"
            echo "$files" | grep -E '^(src/|tests/|bench/|testbench/|scripts/|examples/|docs/|\.env)'
            exit 1
          fi
          echo "package manifest OK"

      - name: Host Typecheck
        run: npm run typecheck -w @memoweft/host

      - name: Host Test
        run: npm test -w @memoweft/host

      - name: Collector Plugin Typecheck
        run: npm run typecheck -w @memoweft/collector-active-window

      - name: Collector Plugin Test
        run: npm test -w @memoweft/collector-active-window

      # Integration packages import Core dist, so they run after Core Build.
      - name: MCP Server Typecheck
        run: npm run typecheck -w @memoweft/mcp-server

      - name: MCP Server Test
        run: npm test -w @memoweft/mcp-server

      - name: MCP Server Build
        run: npm run build -w @memoweft/mcp-server

      - name: AI SDK Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-ai-sdk

      - name: AI SDK Adapter Test
        run: npm test -w @memoweft/adapter-ai-sdk

      - name: AI SDK Adapter Build
        run: npm run build -w @memoweft/adapter-ai-sdk

      # Claude Agent SDK uses optional platform binaries during install.
      - name: Claude Agent SDK Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-claude-agent-sdk

      - name: Claude Agent SDK Adapter Test
        run: npm test -w @memoweft/adapter-claude-agent-sdk

      - name: Claude Agent SDK Adapter Build
        run: npm run build -w @memoweft/adapter-claude-agent-sdk

      # OpenAI Agents tests run offline; the SDK is loaded only when available.
      - name: OpenAI Agents Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-openai-agents

      - name: OpenAI Agents Adapter Test
        run: npm test -w @memoweft/adapter-openai-agents

      - name: OpenAI Agents Adapter Build
        run: npm run build -w @memoweft/adapter-openai-agents

      # LangChain covers retriever, callback, and middleware integration paths.
      - name: LangChain Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-langchain

      - name: LangChain Adapter Test
        run: npm test -w @memoweft/adapter-langchain

      - name: LangChain Adapter Build
        run: npm run build -w @memoweft/adapter-langchain

      # LlamaIndex is a frozen legacy integration; CI protects existing users.
      - name: LlamaIndex Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-llamaindex

      - name: LlamaIndex Adapter Test
        run: npm test -w @memoweft/adapter-llamaindex

      - name: LlamaIndex Adapter Build
        run: npm run build -w @memoweft/adapter-llamaindex

      # Mastra covers the processor-based integration path without live models.
      - name: Mastra Adapter Typecheck
        run: npm run typecheck -w @memoweft/adapter-mastra

      - name: Mastra Adapter Test
        run: npm test -w @memoweft/adapter-mastra

      - name: Mastra Adapter Build
        run: npm run build -w @memoweft/adapter-mastra

      # Smoke-test runnable TypeScript snippets after all workspace builds.
      - name: Docs — runnable snippets
        run: npm run docs:snippets

  # Node 22 compatibility using better-sqlite3.
  better-sqlite3-node22:
    name: Compatibility (Node 22.18+ · better-sqlite3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          # Node 22.18+ supports the repository's native TypeScript test entrypoints.
          node-version: '22.18'
          cache: 'npm'

      - name: Install dependencies (including optional better-sqlite3)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Exercise the supported fallback driver explicitly.
      - name: Core Test (force better-sqlite3)
        run: npm test
        env:
          MEMOWEFT_TEST_DRIVER: better-sqlite3

  # Node 20 compatibility using the built distribution.
  better-sqlite3-node20:
    name: Compatibility (Node 20 · dist smoke · better-sqlite3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          # Node 20 runs the built JavaScript smoke path.
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (including optional better-sqlite3)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Core Build
        run: npm run build

      # Exercise database creation, writes, reads, migrations, and shutdown.
      - name: Dist Smoke (better-sqlite3)
        run: npm run smoke:dist
        env:
          MEMOWEFT_TEST_DRIVER: better-sqlite3

  # SDK compatibility matrix. Probes install one SDK version without modifying the lockfile.
  # Test the lower bound and newest compatible release within each declared range.
  # mcp-server owns its SDK as an implementation dependency, while the AI SDK adapter uses a peer dependency.
  sdk-version-matrix:
    name: SDK version matrix (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Keep failures visible across all combinations.
      matrix:
        include:
          - label: 'adapter-ai-sdk · ai@7.0.0 (peer lower bound)'
            pkg: '@memoweft/adapter-ai-sdk'
            dep: 'ai'
            version: '7.0.0'
          - label: 'adapter-ai-sdk · ai@7 (latest in peer range)'
            pkg: '@memoweft/adapter-ai-sdk'
            dep: 'ai'
            version: '7'
          - label: 'mcp-server · sdk@1.29.0 (dependency lower bound)'
            pkg: '@memoweft/mcp-server'
            dep: '@modelcontextprotocol/sdk'
            version: '1.29.0'
          - label: 'mcp-server · sdk@1 (latest in dependency range)'
            pkg: '@memoweft/mcp-server'
            dep: '@modelcontextprotocol/sdk'
            version: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Use an isolated cache because probes install versions outside the lockfile.
      - name: Setup Node 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Cache npm (isolated key)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.npm
          key: npm-sdkmatrix-${{ matrix.dep }}-${{ matrix.version }}-${{ hashFiles('package-lock.json') }}

      # Install the lockfile baseline before overriding one SDK version.
      - name: Install dependencies (lockfile baseline)
        run: npm ci

      # Build Core dist before checking packages that import it.
      - name: Core Build
        run: npm run build

      # Override one SDK without writing package.json or the lockfile.
      - name: Override ${{ matrix.dep }} to ${{ matrix.version }} (probe, no lockfile write)
        run: |
          npm install "${{ matrix.dep }}@${{ matrix.version }}" -w ${{ matrix.pkg }} --no-save --no-audit --no-fund
          echo "Resolved version:"
          npm ls "${{ matrix.dep }}" -w ${{ matrix.pkg }} || true
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Typecheck (${{ matrix.pkg }})
        run: npm run typecheck -w ${{ matrix.pkg }}

      - name: Test (${{ matrix.pkg }})
        run: npm test -w ${{ matrix.pkg }}

  # Python parity kernel compares shared fixtures with pytest and mypy.
  python-parity:
    name: Python parity (uv · pytest + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.11'
      - name: Sync (dev)
        working-directory: py
        run: uv sync --extra dev
      - name: Parity suite (bit-exact vs TS via shared/parity)
        working-directory: py
        run: uv run pytest -q
      - name: Types (mypy --strict)
        working-directory: py
        run: uv run mypy --strict src tests
      - name: Wheel and sdist smoke
        working-directory: py
        run: uv run python scripts/smoke_distribution.py

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - guardrails
      - better-sqlite3-node22
      - better-sqlite3-node20
      - sdk-version-matrix
      - python-parity
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          test "${{ needs.guardrails.result }}" = "success"
          test "${{ needs['better-sqlite3-node22'].result }}" = "success"
          test "${{ needs['better-sqlite3-node20'].result }}" = "success"
          test "${{ needs['sdk-version-matrix'].result }}" = "success"
          test "${{ needs['python-parity'].result }}" = "success"

  # Publish the root package on a matching version tag.
  # Before publishing, maintainers configure an npm automation token in the NPM_TOKEN secret.
  # The token is supplied through NPM_TOKEN; provenance uses GitHub OIDC.
  # The publish job waits for CI Gate and runs only for version tags.
  publish:
    name: Publish package (tag · npm publish --provenance)
    runs-on: ubuntu-latest
    needs: ci-gate
    if: startsWith(github.ref, 'refs/tags/') && needs.ci-gate.result == 'success'

    permissions:
      # Required for npm provenance attestation.
      id-token: write
      # Read repository contents.
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          # Publish to the public npm registry.
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag matches root package version
        shell: bash
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package version $expected"
            exit 1
          fi

      - name: Verify tagged commit belongs to main
        shell: bash
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${{ github.event.repository.default_branch }}"; then
            echo "::error::tag $GITHUB_REF_NAME does not point to a commit on the default branch"
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Publish only the root package; integrations have independent release versions.
      - name: Publish memoweft to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
