# MemoWeft CI · 三绿护栏（typecheck + test + build）
#
# 触发：push 到默认分支 / 任何 PR。
# 作用：把 AGENTS.md 里的「三绿才算完成」变成合并门——任何改动跑不过就挡在 PR 外。
#
# 为什么锁 Node 24：
#   - 代码直接 import 'node:sqlite'（DatabaseSync），该模块到 Node 24 才转正（22/23 上可用、但只打实验警告、不保证稳定）。
#   - 测试与 build 直接跑 .ts 文件（node --test tests/**/*.test.ts、tsc），依赖 Node 原生跑 TypeScript（同样 22/23 带实验警告）。
#   锁 24 是为稳定；别随手放宽。
#
# 零 runtime 依赖：项目 dependencies 为空（见 package.json / 地图 cell 11），
# 所以这里不缓存 node_modules 也没必要——npm ci 只装 devDependencies（typescript、@types/node），秒级完成。

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支上新推送自动取消旧的在跑任务，省 CI 额度。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: 三绿护栏 (Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          # 锁 24 为稳定：node:sqlite 到 24 转正 + 原生跑 .ts 到 24 才稳（22/23 只打实验警告）。别随手放宽。
          node-version: '24'
          cache: 'npm'

      # 有 lockfile 用 npm ci（可复现）；没有就退回 npm install。
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # 三绿，逐步跑：任一步非零退出，job 即红，PR 被挡。
      # 顺序（架构归位·批次5 步0 · docs/host-migration.md §1.5）：
      #   Core typecheck → Core test → Core build（前置）→ Host typecheck → Host test。
      # 为什么 Core build 必须在 Host 之前：Host 经 `import 'memoweft'` 解析到 dist（路线甲），
      #   其 typecheck 靠 dist/*.d.ts、其 test 靠 dist/*.js —— dist 不先 build 出来，Host 步骤必红。
      # 用 `-w @memoweft/host` 显式点名（本步只有一个 Host 包）；未来插件包多了可换 `--workspaces --if-present`
      #   免维护清单，但 Core build 仍须在 Host 步骤之前。
      - name: Core Typecheck
        run: npm run typecheck

      - name: Core Test
        run: npm test

      - name: Core Build
        run: npm run build

      - name: Host Typecheck
        run: npm run typecheck -w @memoweft/host

      - name: Host Test
        run: npm test -w @memoweft/host
